<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parlay Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f; --surface: #111318; --surface2: #181c22;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
    --accent: #e8ff47; --accent2: #ff6b35; --text: #f0f0ee;
    --muted: #6b7280; --green: #22c55e; --red: #ef4444; --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: var(--accent); }
  .logo span { color: var(--text); }
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  .stats-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 9px 14px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .stat-pill strong { color: var(--accent); font-size: 17px; }

  .controls { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; margin-bottom: 20px; display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .cg { display: flex; flex-direction: column; gap: 5px; }
  .cg label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .cg select, .cg input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 7px 11px; outline: none; }
  .cg input[type=number] { width: 90px; }

  .tabs { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab { padding: 6px 12px; border-radius: 6px; font-size: 12px; font-family: 'DM Mono', monospace; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* SGP toggle */
  .sgp-toggle-wrap { display: flex; flex-direction: column; gap: 5px; }
  .sgp-toggle-wrap label.top-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .toggle-row { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: var(--surface2); border: 1px solid var(--border2); border-radius: 7px; cursor: pointer; user-select: none; transition: border-color 0.15s; }
  .toggle-row:hover { border-color: var(--purple); }
  .toggle-row.on { border-color: var(--purple); background: rgba(167,139,250,0.08); }
  .toggle-track { width: 30px; height: 17px; background: var(--border2); border-radius: 9px; position: relative; flex-shrink: 0; transition: background 0.2s; }
  .toggle-track.on { background: var(--purple); }
  .toggle-thumb { position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; background: #fff; border-radius: 50%; transition: transform 0.2s; }
  .toggle-track.on .toggle-thumb { transform: translateX(13px); }
  .toggle-label { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); transition: color 0.2s; }
  .toggle-row.on .toggle-label { color: var(--purple); }

  .btn { padding: 9px 18px; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; }
  .btn-primary { background: var(--accent); color: #0a0c0f; }
  .btn-primary:hover:not(:disabled) { background: #d4eb2a; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border2); }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm { padding: 5px 10px; font-size: 11px; }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); font-size: 12px; padding: 6px 12px; }

  .layout { display: grid; grid-template-columns: 380px 1fr; gap: 18px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 13px 17px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .panel-title { font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1.5px; color: var(--accent); }
  .panel-body { overflow-y: auto; max-height: 600px; }

  /* Market tabs per game (for SGP) */
  .game-card { border-bottom: 1px solid var(--border); padding: 13px 17px; }
  .game-card:last-child { border-bottom: none; }
  .game-time { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
  .game-teams { font-size: 11px; color: var(--muted); margin-bottom: 8px; font-family: 'DM Mono', monospace; }

  .mkt-tabs { display: flex; gap: 4px; margin-bottom: 8px; flex-wrap: wrap; }
  .mkt-tab { padding: 3px 9px; border-radius: 5px; font-size: 10px; font-family: 'DM Mono', monospace; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--muted); transition: all 0.12s; }
  .mkt-tab.active { background: rgba(232,255,71,0.12); border-color: rgba(232,255,71,0.4); color: var(--accent); }

  .game-matchup { display: flex; flex-direction: column; gap: 5px; }
  .bet-row { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 7px; border: 1px solid var(--border); cursor: pointer; transition: all 0.15s; background: var(--surface2); }
  .bet-row:hover { border-color: rgba(232,255,71,0.4); }
  .bet-row.selected { border-color: var(--accent); background: rgba(232,255,71,0.07); }
  .bet-row.selected-sgp { border-color: var(--purple); background: rgba(167,139,250,0.07); }
  .bet-row.dimmed { opacity: 0.3; pointer-events: none; }
  .check-box { width: 15px; height: 15px; border: 1.5px solid var(--border2); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
  .bet-row.selected .check-box { background: var(--accent); border-color: var(--accent); color: #000; }
  .bet-row.selected-sgp .check-box { background: var(--purple); border-color: var(--purple); color: #000; }
  .team-name { flex: 1; font-size: 12px; font-weight: 500; }
  .mkt-label { font-size: 9px; font-family: 'DM Mono', monospace; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 1px 5px; white-space: nowrap; }
  .odds-badge { font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 500; padding: 2px 7px; border-radius: 4px; min-width: 56px; text-align: center; }
  .odds-pos { color: var(--green); background: rgba(34,197,94,0.1); }
  .odds-neg { color: var(--accent2); background: rgba(255,107,53,0.1); }

  /* SGP group indicator */
  .sgp-header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; padding: 4px 8px; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.2); border-radius: 5px; }
  .sgp-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--purple); flex-shrink: 0; }
  .sgp-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--purple); }

  .generate-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 18px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .sel-count { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }
  .sel-count strong { color: var(--accent); font-size: 16px; }

  /* Parlay table */
  .parlay-table { width: 100%; border-collapse: collapse; }
  .parlay-table th { font-family: 'DM Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 9px 13px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; }
  .parlay-table td { padding: 9px 13px; font-size: 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .parlay-table tr:hover td { background: rgba(255,255,255,0.02); }
  .parlay-num { font-family: 'DM Mono', monospace; color: var(--muted); font-size: 11px; }
  .legs-list { display: flex; flex-wrap: wrap; gap: 4px; }
  .leg-tag { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; font-size: 10px; font-family: 'DM Mono', monospace; white-space: nowrap; }
  .leg-tag.sgp-leg { border-color: rgba(167,139,250,0.3); color: var(--purple); }
  .parlay-odds { font-family: 'Bebas Neue', sans-serif; font-size: 19px; letter-spacing: 1px; }
  .odds-great { color: var(--accent); }
  .odds-good { color: var(--green); }
  .odds-ok { color: var(--accent2); }
  .leg-badge { font-size: 10px; background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); border-radius: 4px; padding: 2px 6px; font-family: 'DM Mono', monospace; }
  .sgp-badge { font-size: 10px; background: rgba(167,139,250,0.1); color: var(--purple); border: 1px solid rgba(167,139,250,0.2); border-radius: 4px; padding: 2px 6px; font-family: 'DM Mono', monospace; }
  .type-badges { display: flex; gap: 4px; flex-wrap: wrap; }
  .payout-cell { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--green); }
  .note-cell { font-size: 10px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 240px; color: var(--muted); font-size: 13px; gap: 8px; }
  .empty-state .icon { font-size: 30px; opacity: 0.25; }
  .loading { display: flex; align-items: center; justify-content: center; height: 180px; gap: 10px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-box { margin: 14px; padding: 14px 16px; color: var(--red); font-size: 12px; font-family: 'DM Mono', monospace; background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; line-height: 1.7; }
  .count-badge { font-size: 10px; background: rgba(232,255,71,0.1); color: var(--accent); border: 1px solid rgba(232,255,71,0.2); border-radius: 4px; padding: 2px 8px; font-family: 'DM Mono', monospace; }

  .divider { height: 1px; background: var(--border); margin: 6px 0; }
  .section-label { font-size: 10px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 8px 17px 4px; }

  @media (max-width: 900px) { .layout { grid-template-columns: 1fr; } .panel-body { max-height: 380px; } }
</style>
</head>
<body>

<div class="header">
  <div class="logo">PARLAY<span>LAB</span></div>
  <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace" id="hdate"></div>
</div>

<div class="main">
  <div class="stats-bar">
    <div class="stat-pill"><strong id="s-games">—</strong> Games</div>
    <div class="stat-pill"><strong id="s-bets">—</strong> Bets</div>
    <div class="stat-pill"><strong id="s-sel">0</strong> Selected</div>
    <div class="stat-pill"><strong id="s-parlays">0</strong> Parlays Generated</div>
  </div>

  <div class="controls">
    <div class="cg">
      <label>Markets to Load</label>
      <div class="tabs" id="mkt-tabs">
        <button class="tab active" data-mkt="h2h" onclick="toggleMkt('h2h',this)">Moneyline</button>
        <button class="tab active" data-mkt="spreads" onclick="toggleMkt('spreads',this)">Spread</button>
        <button class="tab active" data-mkt="totals" onclick="toggleMkt('totals',this)">Totals</button>
      </div>
    </div>
    <div class="cg"><label>Min Legs</label><input type="number" id="min-legs" value="2" min="2" max="8"></div>
    <div class="cg"><label>Max Legs</label><input type="number" id="max-legs" value="3" min="2" max="10"></div>
    <div class="cg"><label>Min Odds/Leg</label><input type="number" id="min-odds" value="-200"></div>
    <div class="cg"><label>Min Parlay Odds</label><input type="number" id="min-parlay" value="200"></div>
    <div class="cg"><label>Stake ($)</label><input type="number" id="stake" value="10" min="1"></div>
    <div class="sgp-toggle-wrap">
      <label class="top-label">Same-Game Parlays</label>
      <div class="toggle-row" id="sgp-toggle" onclick="toggleSGP()">
        <div class="toggle-track" id="sgp-track"><div class="toggle-thumb"></div></div>
        <span class="toggle-label" id="sgp-label">OFF — cross-game only</span>
      </div>
    </div>
    <button class="btn btn-secondary" onclick="loadGames()">↻ Refresh</button>
  </div>

  <div class="layout">
    <!-- Games panel -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Today's Games</span>
          <div style="display:flex;gap:6px">
            <button class="btn btn-secondary btn-sm" onclick="selectAll()">All</button>
            <button class="btn btn-secondary btn-sm" onclick="selectNone()">None</button>
          </div>
        </div>
        <div class="panel-body" id="games-container">
          <div class="loading"><div class="spinner"></div>Fetching odds...</div>
        </div>
      </div>
    </div>

    <!-- Parlays panel -->
    <div>
      <div class="generate-bar">
        <div class="sel-count"><strong id="gen-sel">0</strong> bets selected</div>
        <div id="sgp-sel-info" style="font-size:11px;color:var(--purple);font-family:'DM Mono',monospace;display:none"></div>
        <div style="flex:1"></div>
        <button class="btn btn-primary" id="gen-btn" onclick="generateParlays()" disabled>⚡ Generate Parlays</button>
        <button class="btn btn-danger" id="clear-btn" onclick="clearParlays()" style="display:none">Clear</button>
      </div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">Parlays</span>
          <span class="count-badge" id="parlay-badge" style="display:none"></span>
        </div>
        <div class="panel-body" id="parlays-container">
          <div class="empty-state"><div class="icon">🏀</div><div>Select bets → Generate</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const ODDS_API_KEY = '6c9c3b8b3ed03f6b513ba28902c4d87a';
const MKT_LABELS = { h2h: 'ML', spreads: 'ATS', totals: 'O/U' };

let allGames = [];
let selectedBets = new Set(); // id => { id, name, odds, gameId, market, point }
let selectedBetData = {};
let activeMkts = new Set(['h2h','spreads','totals']);
let sgpEnabled = false;
let generatedParlays = [];
let gameMarketView = {}; // gameId => active market tab in SGP mode

document.getElementById('hdate').textContent = 'MARCH MADNESS · ' + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}).toUpperCase();

// --- SGP Toggle ---
function toggleSGP() {
  sgpEnabled = !sgpEnabled;
  const track = document.getElementById('sgp-track');
  const label = document.getElementById('sgp-label');
  const row = document.getElementById('sgp-toggle');
  track.classList.toggle('on', sgpEnabled);
  row.classList.toggle('on', sgpEnabled);
  label.textContent = sgpEnabled ? 'ON — same-game allowed' : 'OFF — cross-game only';
  if (allGames.length) renderGames();
  updateStats();
}

// --- Market tab toggle (for loading) ---
function toggleMkt(mkt, btn) {
  if (activeMkts.has(mkt)) {
    if (activeMkts.size === 1) return; // keep at least one
    activeMkts.delete(mkt);
    btn.classList.remove('active');
  } else {
    activeMkts.add(mkt);
    btn.classList.add('active');
  }
}

// --- Fetch ---
async function fetchOdds() {
  const mkts = Array.from(activeMkts).join(',');
  const url = `https://api.the-odds-api.com/v4/sports/basketball_ncaab/odds/?apiKey=${ODDS_API_KEY}&regions=us&markets=${mkts}&oddsFormat=american&dateFormat=iso`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: `Fetch this URL and return ONLY the raw JSON array, no other text: ${url}` }]
    })
  });

  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();
  const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('');
  const match = text.match(/\[[\s\S]*\]/);
  if (match) { try { return JSON.parse(match[0]); } catch(e) { throw new Error('Parse error'); } }
  throw new Error('No data returned');
}

async function loadGames() {
  document.getElementById('games-container').innerHTML = '<div class="loading"><div class="spinner"></div>Fetching live NCAA odds...</div>';
  selectedBets.clear(); selectedBetData = {}; updateStats();

  try {
    const games = await fetchOdds();
    const today = new Date(); today.setHours(0,0,0,0);
    const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
    const todayGames = games.filter(g => { const d = new Date(g.commence_time); return d >= today && d < tomorrow; });
    allGames = todayGames.length > 0 ? todayGames : games.slice(0,20);

    // Initialize market view per game (default to first available market)
    allGames.forEach(g => { gameMarketView[g.id] = Array.from(activeMkts)[0]; });

    renderGames();

    let bc = 0;
    allGames.forEach(g => {
      const bm = g.bookmakers?.[0];
      if (!bm) return;
      Array.from(activeMkts).forEach(mkt => {
        const m = bm.markets?.find(x => x.key === mkt);
        if (m) bc += m.outcomes.length;
      });
    });
    document.getElementById('s-games').textContent = allGames.length;
    document.getElementById('s-bets').textContent = bc;
  } catch(e) {
    document.getElementById('games-container').innerHTML = `<div class="error-box">⚠ ${e.message}<br><br>Make sure you opened this file directly in Chrome/Safari (not inside another app). If it still fails, try clicking Refresh.</div>`;
  }
}

function renderGames() {
  const minOdds = parseInt(document.getElementById('min-odds').value) || -10000;
  const container = document.getElementById('games-container');

  if (!allGames.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📅</div><div>No games found</div></div>';
    return;
  }

  container.innerHTML = allGames.map(game => {
    const bm = game.bookmakers?.[0];
    if (!bm) return '';

    const time = new Date(game.commence_time).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'});

    if (sgpEnabled) {
      // SGP mode: show market tabs per game so user can pick from multiple markets
      const availMkts = Array.from(activeMkts).filter(mkt => bm.markets?.find(m => m.key === mkt));
      if (!availMkts.length) return '';
      const activeMkt = gameMarketView[game.id] || availMkts[0];

      const mktTabsHtml = availMkts.map(mkt =>
        `<button class="mkt-tab ${mkt === activeMkt ? 'active' : ''}" onclick="setGameMkt('${game.id}','${mkt}',this)">${MKT_LABELS[mkt]||mkt}</button>`
      ).join('');

      const mkt = bm.markets?.find(m => m.key === activeMkt);
      const rows = mkt ? mkt.outcomes.map(o => buildBetRow(game, o, activeMkt, minOdds)).join('') : '';

      // Count how many legs from this game are already selected
      const sgpCount = Array.from(selectedBets).filter(id => selectedBetData[id]?.gameId === game.id).length;
      const sgpIndicator = sgpCount > 1 ? `<div class="sgp-header"><div class="sgp-dot"></div><span class="sgp-label">${sgpCount} legs from this game (SGP)</span></div>` : '';

      return `<div class="game-card" id="gc-${game.id}">
        <div class="game-time">🏀 ${time}</div>
        <div class="game-teams">${game.away_team} @ ${game.home_team}</div>
        ${sgpIndicator}
        <div class="mkt-tabs">${mktTabsHtml}</div>
        <div class="game-matchup" id="gm-${game.id}">${rows}</div>
      </div>`;
    } else {
      // Standard mode: show all markets stacked
      const sections = Array.from(activeMkts).map(mkt => {
        const mktData = bm.markets?.find(m => m.key === mkt);
        if (!mktData) return '';
        const rows = mktData.outcomes.map(o => buildBetRow(game, o, mkt, minOdds)).join('');
        return `<div class="section-label" style="padding:4px 0 3px;font-size:9px">${MKT_LABELS[mkt]||mkt}</div>${rows}`;
      }).filter(Boolean).join('<div class="divider"></div>');

      return `<div class="game-card">
        <div class="game-time">🏀 ${time}</div>
        <div class="game-teams">${game.away_team} @ ${game.home_team}</div>
        <div class="game-matchup">${sections}</div>
      </div>`;
    }
  }).join('');
}

function buildBetRow(game, o, mkt, minOdds) {
  const id = `${game.id}||${mkt}||${o.name}||${o.price}` + (o.point !== undefined ? `||${o.point}` : '');
  const isSel = selectedBets.has(id);
  const isSgpLeg = isSel && sgpEnabled;
  const pos = o.price >= 0;
  const pts = o.point !== undefined ? ` ${o.point > 0 ? '+' : ''}${o.point}` : '';
  const meetsMin = o.price >= minOdds;
  const selClass = isSel ? (sgpEnabled ? 'selected-sgp' : 'selected') : '';
  const escapedId = id.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<div class="bet-row ${selClass} ${!meetsMin?'dimmed':''}" onclick="toggleBet(this,'${escapedId}','${game.id}','${mkt}',${o.price})">
    <div class="check-box">${isSel?'✓':''}</div>
    <div class="team-name">${o.name}${pts}${o.description?' '+o.description:''}</div>
    <span class="mkt-label">${MKT_LABELS[mkt]||mkt}</span>
    <div class="odds-badge ${pos?'odds-pos':'odds-neg'}">${pos?'+':''}${o.price}</div>
  </div>`;
}

function setGameMkt(gameId, mkt, btn) {
  gameMarketView[gameId] = mkt;
  // Update tabs UI
  const card = document.getElementById(`gc-${gameId}`);
  if (!card) return;
  card.querySelectorAll('.mkt-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // Re-render just this game's rows
  const bm = allGames.find(g => g.id === gameId)?.bookmakers?.[0];
  const mktData = bm?.markets?.find(m => m.key === mkt);
  const minOdds = parseInt(document.getElementById('min-odds').value) || -10000;
  const game = allGames.find(g => g.id === gameId);
  const rowsContainer = document.getElementById(`gm-${gameId}`);
  if (rowsContainer && mktData && game) {
    rowsContainer.innerHTML = mktData.outcomes.map(o => buildBetRow(game, o, mkt, minOdds)).join('');
  }
}

function toggleBet(el, id, gameId, mkt, price) {
  if (selectedBets.has(id)) {
    selectedBets.delete(id);
    delete selectedBetData[id];
    const selClass = sgpEnabled ? 'selected-sgp' : 'selected';
    el.classList.remove(selClass);
    el.querySelector('.check-box').textContent = '';
  } else {
    selectedBets.add(id);
    const parts = id.split('||');
    selectedBetData[id] = { id, gameId, market: mkt, name: parts[2], odds: price, point: parts[4] };
    const selClass = sgpEnabled ? 'selected-sgp' : 'selected';
    el.classList.add(selClass);
    el.querySelector('.check-box').textContent = '✓';
  }
  updateStats();
  // Update SGP indicator for this game
  if (sgpEnabled) {
    const card = document.getElementById(`gc-${gameId}`);
    if (card) {
      const sgpCount = Array.from(selectedBets).filter(id2 => selectedBetData[id2]?.gameId === gameId).length;
      let indicator = card.querySelector('.sgp-header');
      if (sgpCount > 1) {
        const html = `<div class="sgp-header"><div class="sgp-dot"></div><span class="sgp-label">${sgpCount} legs from this game (SGP)</span></div>`;
        if (indicator) indicator.outerHTML = html;
        else card.querySelector('.mkt-tabs').insertAdjacentHTML('beforebegin', html);
      } else if (indicator) indicator.remove();
    }
  }
}

function updateStats() {
  const n = selectedBets.size;
  document.getElementById('s-sel').textContent = n;
  document.getElementById('gen-sel').textContent = n;
  document.getElementById('gen-btn').disabled = n < 2;

  // SGP info
  const sgpInfo = document.getElementById('sgp-sel-info');
  if (sgpEnabled) {
    const gameGroups = {};
    Object.values(selectedBetData).forEach(b => { gameGroups[b.gameId] = (gameGroups[b.gameId]||0)+1; });
    const sgpGames = Object.values(gameGroups).filter(c => c > 1).length;
    if (sgpGames > 0) {
      sgpInfo.textContent = `${sgpGames} SGP game${sgpGames>1?'s':''} included`;
      sgpInfo.style.display = 'block';
    } else { sgpInfo.style.display = 'none'; }
  } else { sgpInfo.style.display = 'none'; }
}

function selectAll() {
  document.querySelectorAll('.bet-row:not(.dimmed)').forEach(el => {
    const onclick = el.getAttribute('onclick');
    const m = onclick.match(/toggleBet\(this,'([^']+)','([^']+)','([^']+)',(-?\d+)\)/);
    if (!m) return;
    const [,id,gameId,mkt,priceStr] = m;
    const realId = id.replace(/\\'/g,"'");
    if (!selectedBets.has(realId)) {
      selectedBets.add(realId);
      const parts = realId.split('||');
      selectedBetData[realId] = { id: realId, gameId, market: mkt, name: parts[2], odds: parseInt(priceStr), point: parts[4] };
      const selClass = sgpEnabled ? 'selected-sgp' : 'selected';
      el.classList.add(selClass);
      el.querySelector('.check-box').textContent = '✓';
    }
  });
  updateStats();
}

function selectNone() {
  selectedBets.clear(); selectedBetData = {};
  document.querySelectorAll('.bet-row.selected, .bet-row.selected-sgp').forEach(el => {
    el.classList.remove('selected','selected-sgp');
    el.querySelector('.check-box').textContent = '';
  });
  document.querySelectorAll('.sgp-header').forEach(el => el.remove());
  updateStats();
}

function toDecimal(o) { return o >= 100 ? o/100+1 : 100/Math.abs(o)+1; }
function toAmerican(d) { return d >= 2 ? Math.round((d-1)*100) : Math.round(-100/(d-1)); }

function combos(arr, k) {
  if (k === 1) return arr.map(x => [x]);
  if (k === arr.length) return [arr];
  const r = [];
  for (let i = 0; i <= arr.length-k; i++) combos(arr.slice(i+1),k-1).forEach(c => r.push([arr[i],...c]));
  return r;
}

function generateParlays() {
  const minL = parseInt(document.getElementById('min-legs').value)||2;
  const maxL = parseInt(document.getElementById('max-legs').value)||3;
  const minPO = parseInt(document.getElementById('min-parlay').value)||200;
  const stake = parseFloat(document.getElementById('stake').value)||10;

  const bets = Object.values(selectedBetData);
  generatedParlays = [];

  for (let k = minL; k <= maxL; k++) {
    combos(bets, k).forEach(combo => {
      // Conflict check: in standard mode, no same-game parlays
      // In SGP mode, allow same-game BUT not the same team/side twice in same market
      const gameGroups = {};
      let hasConflict = false;

      combo.forEach(b => {
        if (!gameGroups[b.gameId]) gameGroups[b.gameId] = [];
        gameGroups[b.gameId].push(b);
      });

      if (!sgpEnabled) {
        // Strict: no same-game legs at all
        if (Object.values(gameGroups).some(legs => legs.length > 1)) return;
      } else {
        // SGP mode: block contradictory legs (same market, same game, opposite sides)
        Object.values(gameGroups).forEach(legs => {
          if (legs.length < 2) return;
          // Group by market within the game
          const byMkt = {};
          legs.forEach(l => { if (!byMkt[l.market]) byMkt[l.market] = []; byMkt[l.market].push(l); });
          // If same market has 2+ legs and same point, they must be different names (not both Over/Under same total)
          Object.values(byMkt).forEach(mLegs => {
            if (mLegs.length < 2) return;
            // For totals: can't have Over AND Under same line
            mLegs.forEach((a, i) => mLegs.slice(i+1).forEach(b => {
              if (a.point !== undefined && b.point !== undefined && a.point === b.point) hasConflict = true;
              if (a.market === 'h2h' && b.market === 'h2h') hasConflict = true; // can't bet both ML sides
            }));
          });
        });
        if (hasConflict) return;
      }

      const dec = combo.reduce((a,b) => a * toDecimal(b.odds), 1);
      const am = toAmerican(dec);
      if (am < minPO) return;

      // Determine if this parlay contains any SGP component
      const hasSgp = Object.values(gameGroups).some(legs => legs.length > 1);
      const sgpGames = Object.entries(gameGroups).filter(([,legs]) => legs.length > 1).map(([gid]) => {
        const g = allGames.find(x => x.id === gid);
        return g ? `${g.away_team} @ ${g.home_team}` : gid;
      });

      generatedParlays.push({ combo, am, payout: ((dec-1)*stake).toFixed(2), hasSgp, sgpGames });
    });
  }

  generatedParlays.sort((a,b) => b.am - a.am);
  renderParlays(stake);
  document.getElementById('s-parlays').textContent = generatedParlays.length;
  document.getElementById('clear-btn').style.display = 'inline-block';
  const badge = document.getElementById('parlay-badge');
  badge.textContent = `${generatedParlays.length} parlays`;
  badge.style.display = 'inline-block';
}

function renderParlays(stake) {
  const container = document.getElementById('parlays-container');
  if (!generatedParlays.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎲</div><div>No parlays met criteria — try loosening filters</div></div>';
    return;
  }

  const disp = generatedParlays.slice(0,500);
  container.innerHTML = `
    <table class="parlay-table">
      <thead><tr><th>#</th><th>Type</th><th>Selections</th><th>Odds</th><th>Payout ($${stake})</th></tr></thead>
      <tbody>
        ${disp.map((p,i) => {
          const cls = p.am>=500?'odds-great':p.am>=300?'odds-good':'odds-ok';
          const legs = p.combo.map(b => {
            const isSgpLeg = p.hasSgp && p.sgpGames?.some(sg => {
              const g = allGames.find(x => x.away_team+' @ '+x.home_team === sg || x.id === b.gameId);
              return g && p.combo.filter(x=>x.gameId===b.gameId).length > 1;
            });
            const pts = b.point ? ` ${parseFloat(b.point)>0?'+':''}${b.point}` : '';
            return `<span class="leg-tag ${b.gameId && p.combo.filter(x=>x.gameId===b.gameId).length>1?'sgp-leg':''}">${b.name}${pts} <span style="opacity:0.5">${MKT_LABELS[b.market]||b.market}</span> (${b.odds>=0?'+':''}${b.odds})</span>`;
          }).join('');
          const typeBadges = `<div class="type-badges">
            <span class="leg-badge">${p.combo.length}-leg</span>
            ${p.hasSgp?`<span class="sgp-badge">SGP</span>`:''}
          </div>`;
          const note = p.hasSgp ? `<div class="note-cell" style="margin-top:3px">⚠ SGP odds are estimates — confirm with your book</div>` : '';
          return `<tr>
            <td class="parlay-num">${i+1}</td>
            <td>${typeBadges}</td>
            <td><div class="legs-list">${legs}</div>${note}</td>
            <td><span class="parlay-odds ${cls}">+${p.am}</span></td>
            <td class="payout-cell">+$${p.payout}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    ${generatedParlays.length>500?`<div style="padding:10px 14px;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace">Showing 500 of ${generatedParlays.length} parlays</div>`:''}`;
}

function clearParlays() {
  generatedParlays = [];
  document.getElementById('parlays-container').innerHTML = '<div class="empty-state"><div class="icon">🏀</div><div>Select bets → Generate</div></div>';
  document.getElementById('s-parlays').textContent = '0';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('parlay-badge').style.display = 'none';
}

loadGames();
</script>
